<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<title>Recognit</title>

<style>

body{
    background:#000;
    overflow-x:hidden;
}

/* Header shape */
.header-shape{
    clip-path:polygon(
        0 0,
        100% 0,
        92% 100%,
        0 100%
    );
}

/* Dropdown */
.dropdown{
    opacity:0;
    visibility:hidden;
    transform:translateY(-15px);
    transition:.35s ease;
}

.dropdown.active{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

/* Search animation */
.search-box{
    width:60px;
    transition:.5s ease;
}

.search-box.active{
    width:350px;
}

.search-input{
    width:0;
    opacity:0;
    transition:.5s ease;
}

.search-box.active .search-input{
    width:100%;
    opacity:1;
}

/* menu item hover */
.nav-link{
    position:relative;
}

.nav-link::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-6px;
    width:0;
    height:2px;
    background:#d4a017;
    transition:.3s;
}

.nav-link:hover::after{
    width:100%;
}

</style>

</head>
<body>


<!-- HEADER -->
<header class="relative z-50">

<div class="flex justify-between">

    <!-- LEFT -->
    <div
    class="header-shape bg-zinc-100 h-[150px] w-[68%] flex items-center px-24 gap-24">

        <!-- LOGO -->
        <div class="w-20 h-20 rounded-2xl bg-black flex justify-center items-center">

            <span class="text-white text-5xl font-light">
                R
            </span>

        </div>


        <!-- NAV -->
        <nav class="flex items-center gap-24 text-2xl relative">

            <!-- SERVICES -->
            <div class="relative">

                <button
                id="servicesBtn"
                class="flex items-center gap-3 nav-link">

                    Services

                    <i
                    id="arrow"
                    class="fa-solid fa-angle-down duration-300"></i>

                </button>


                <!-- DROPDOWN -->
                <div
                id="dropdown"
                class="dropdown absolute top-16 bg-zinc-100 border border-amber-500 w-72 shadow-xl">

                    <a href="#"
                    class="flex justify-between px-10 py-8 text-xl hover:bg-gray-200 duration-300">

                        On branding

                        <i class="fa-solid fa-caret-right"></i>

                    </a>

                    <a href="#"
                    class="flex justify-between px-10 py-8 text-xl hover:bg-gray-200 duration-300">

                        On marketing

                        <i class="fa-solid fa-caret-right"></i>

                    </a>

                </div>

            </div>


            <a href="#" class="nav-link">
                Pricing & Plans
            </a>

            <a href="#" class="nav-link">
                Contact Us
            </a>

        </nav>

    </div>


    <!-- SEARCH -->
    <div class="flex items-center px-24">

        <div
        id="searchBox"
        class="search-box overflow-hidden rounded-full bg-white border-2 border-amber-600 flex items-center">

            <input
            class="search-input px-8 outline-none text-xl"
            placeholder="Search here.....">

            <button
            class="w-14 h-14 flex justify-center items-center">

                <i class="fa-solid fa-magnifying-glass text-amber-600 text-2xl"></i>

            </button>

        </div>

    </div>

</div>

</header>


<!-- HERO -->
<section class="min-h-screen bg-black">

</section>


<script>

// Dropdown
const servicesBtn = document.getElementById("servicesBtn");
const dropdown = document.getElementById("dropdown");
const arrow = document.getElementById("arrow");

servicesBtn.addEventListener("click", ()=>{

    dropdown.classList.toggle("active");

    arrow.classList.toggle("rotate-180");

});



// Search
const searchBox = document.getElementById("searchBox");

searchBox.addEventListener("click", ()=>{

    searchBox.classList.add("active");

});



// Close dropdown when clicking elsewhere
window.addEventListener("click",(e)=>{

    if(
        !servicesBtn.contains(e.target)
        &&
        !dropdown.contains(e.target)
    ){
        dropdown.classList.remove("active");
        arrow.classList.remove("rotate-180");
    }

});

</script>

</body>
</html>
